<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=reviewer.html">
  <title>GED0081 Physics 1 Finals Reviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a12;
      color: #f0f0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 10%, rgba(79,142,247,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 90%, rgba(139,92,246,0.12) 0%, transparent 50%);
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: rgba(19,19,42,0.95);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      max-width: 420px;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #4f8ef7, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    p { color: #8888b0; margin-bottom: 28px; line-height: 1.6; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #4f8ef7, #8b5cf6);
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 4px 20px rgba(79,142,247,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,142,247,0.4); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(79,142,247,0.2);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">&#x26DB;</span>
    <h1>GED0081 Physics 1<br>Finals Reviewer</h1>
    <p>Redirecting you to the interactive reviewer&hellip;</p>
    <a href="reviewer.html">Open Reviewer &rarr;</a>
    <div class="spinner"></div>
  </div>
  <script>
    // Instant redirect as backup
    setTimeout(function(){ window.location.href = 'reviewer.html'; }, 500);
  </script>
</body>
</html>
